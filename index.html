      // Mischia l'array usando l'algoritmo di Fisher-Yates
      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

        const [view, setView] = React.useState('start'); // start, quiz, end
        const [questions, setQuestions] = React.useState([]);
        const [currentIdx, setCurrentIdx] = React.useState(0);
        const [score, setScore] = React.useState(0);
        const [selected, setSelected] = React.useState(null);

          const prepared = shuffle(rawData).map((item) => ({
            question: item[0],
            correct: item[1],
            options: shuffle([item[1], item[2], item[3]]),
          }));
          setQuestions(prepared);
          setCurrentIdx(0);
          setScore(0);
          setSelected(null);
          setView('quiz');
        };

        const handleSelect = (opt) => {
          if (selected) return;
          setSelected(opt);
          if (opt === questions[currentIdx].correct) setScore((s) => s + 1);

          setTimeout(() => {
            if (currentIdx < questions.length - 1) {
              setCurrentIdx((prev) => prev + 1);
              setSelected(null);
            } else {
              setView('end');
            }
          }, 1200);
        };

                  complete.
                  <br />
                  Le opzioni e l'ordine delle domande sono generati casualmente
                  ogni volta.
                </p>
              </div>
              <button
                onClick={startQuiz}
                className="bg-slate-900 hover:bg-black text-white px-12 py-5 rounded-2xl font-bold text-xl shadow-lg transition-transform hover:scale-105 active:scale-95"

                Comincia ora

                <span className="text-slate-900">
                  {((score / questions.length) * 100).toFixed(1)}%
                </span>
              </div>
              <button
                onClick={startQuiz}
                className="bg-slate-900 hover:bg-black text-white px-10 py-4 rounded-xl font-bold transition-all"
              >
                Ricomincia Quiz
              </button>
            </div>
          );

        const q = questions[currentIdx];
        const progress = ((currentIdx + 1) / questions.length) * 100;

        return (
          <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <div className="mb-8">

                    key={i}
                    onClick={() => handleSelect(opt)}
                    disabled={!!selected}
                    className={classes}
                  >
                    <div className="flex items-start">
                      <span className="inline-flex items-center justify-center h-8 w-8 rounded-lg bg-slate-100 text-slate-400 text-xs font-black mr-4 shrink-0 mt-0.5">

                      <span>{opt}</span>

                  </button>
